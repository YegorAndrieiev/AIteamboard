version: '3.9'

services:
  frontend:
    build: ./client
    ports:
      - '5173:5173'
    depends_on:
      - backend
    env_file:
      - ./client/.env

  backend:
    build: ./server
    ports:
      - '5000:5000'
    depends_on:
      - postgres
    env_file:
      - ./server/.env

  postgres:
    image: postgres:16
    restart: always
    env_file:
      - ./server/.env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: aiteamboard
    ports:
      - '5432:5432'